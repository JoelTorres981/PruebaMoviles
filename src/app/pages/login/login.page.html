<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Iniciar Sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Iniciar Sesión</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="form-container">
    <ion-card class="simple-card">
      <ion-card-header>
        <ion-card-title>Bienvenido</ion-card-title>
        <ion-card-subtitle>Ingresa a tu cuenta para continuar</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-input 
          class="ion-margin-bottom"
          type="email" 
          label="Correo electrónico" 
          label-placement="floating" 
          fill="outline" 
          [(ngModel)]="email">
        </ion-input>

        <ion-input 
          class="ion-margin-bottom"
          type="password" 
          label="Contraseña" 
          label-placement="floating" 
          fill="outline" 
          [(ngModel)]="password">
        </ion-input>

        <ion-text color="danger" *ngIf="mensaje" class="error-msg">
          <p>{{ mensaje }}</p>
        </ion-text>

        <ion-button expand="block" class="ion-margin-top" (click)="login()">
          Iniciar sesión
        </ion-button>

        <div class="divider">
          <span>O</span>
        </div>

        <ion-button expand="block" fill="outline" color="medium" (click)="register()">
          Registrarse
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
