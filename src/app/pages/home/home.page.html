<ion-header>
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
    <ion-button slot="end" (click)="logout()">Cerrar Sesión</ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card color="light" style="text-align: center;">
    <ion-img style="width: 200px; height: 200px; margin: 0 auto; object-fit: cover; border-radius: 50%;" [src]="profilePic" alt="Foto Perfil"></ion-img>
    <ion-card-header>
      <ion-card-title>Informacion Personal</ion-card-title><br>
      <ion-label>Nombre: <span>Joel Torres</span> </ion-label>
      <ion-label>Carrera: <span>Desarrollo de software</span></ion-label>
    </ion-card-header>
  </ion-card>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="changeProfilePic()">
      <ion-icon name="camera"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
